services:
  nauthenticity:
    container_name: nauthenticity
    image: ghcr.io/samuelaure/nau/nauthenticity:${TAG:-latest}
    env_file: .env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://${DATABASE_USER}:${DATABASE_PASSWORD}@nauthenticity-postgres:5432/${DATABASE_NAME}?schema=public
      - REDIS_HOST=nauthenticity-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - ./storage:/app/storage
    depends_on:
      nauthenticity-postgres:
        condition: service_healthy
      nauthenticity-redis:
        condition: service_healthy
    networks:
      - nau-network
    labels:
      - traefik.enable=true
      - traefik.http.routers.nauthenticity.rule=Host(`nauthenticity.9nau.com`)
      - traefik.http.routers.nauthenticity.entrypoints=websecure
      - traefik.http.routers.nauthenticity.tls=true
      - traefik.http.routers.nauthenticity.tls.certresolver=letsencrypt
      - traefik.http.services.nauthenticity.loadbalancer.server.port=3000
      - traefik.docker.network=nau-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 640M
          cpus: '1.00'
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'

  nauthenticity-postgres:
    image: pgvector/pgvector:pg16
    container_name: nauthenticity-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}']
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - nauthenticity-postgres-data:/var/lib/postgresql/data
    networks:
      - nau-network
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: '0.50'
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'

  nauthenticity-redis:
    image: redis:7-alpine
    container_name: nauthenticity-redis
    restart: unless-stopped
    command: redis-server --requirepass "${REDIS_PASSWORD}"
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a "$$REDIS_PASSWORD" ping']
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - nauthenticity-redis-data:/data
    networks:
      - nau-network
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.15'
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'

networks:
  nau-network:
    external: true

volumes:
  nauthenticity-postgres-data:
  nauthenticity-redis-data:
