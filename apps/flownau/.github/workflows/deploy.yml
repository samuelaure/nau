name: Deploy flownaŭ

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    # Real PostgreSQL available during npm run build — eliminates the
    # "Failed to collect page data" error that plagued in-Docker builds.
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: builduser
          POSTGRES_PASSWORD: buildpass
          POSTGRES_DB: flownau_build
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U builduser -d flownau_build"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://builduser:buildpass@localhost:5432/flownau_build

      - name: Push schema to build DB
        run: npx prisma db push
        env:
          DATABASE_URL: postgresql://builduser:buildpass@localhost:5432/flownau_build

      - name: Build Next.js
        env:
          DATABASE_URL: postgresql://builduser:buildpass@localhost:5432/flownau_build
          NEXTAUTH_SECRET: build_time_placeholder_secret_32ch
          AUTH_SECRET: build_time_placeholder_secret_32ch
          R2_ENDPOINT: https://placeholder.r2.cloudflarestorage.com
          R2_ACCESS_KEY_ID: placeholder
          R2_SECRET_ACCESS_KEY: placeholder
          R2_BUCKET_NAME: placeholder
          NODE_ENV: production
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push App
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          no-cache: true
          tags: ghcr.io/${{ github.repository }}/app:latest,ghcr.io/${{ github.repository }}/app:${{ github.ref_name }}

      - name: Copy docker-compose.yml to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: 'docker-compose.yml'
          target: '/root/flownau/'

      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            mkdir -p /root/flownau

            # Login to GHCR to pull private images
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Write production .env from secrets
            cat > /root/flownau/.env.tmp << 'ENVEOF'
            POSTGRES_USER=flownau_user
            POSTGRES_PASSWORD=${{ secrets.DB_PASSWORD }}
            POSTGRES_DB=flownau
            REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
            PUBLIC_DOMAIN=flownau.9nau.com
            GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            R2_ACCOUNT_ID=${{ secrets.R2_ACCOUNT_ID }}
            R2_ACCESS_KEY=${{ secrets.R2_ACCESS_KEY }}
            R2_SECRET_KEY=${{ secrets.R2_SECRET_KEY }}
            R2_BUCKET_NAME=${{ secrets.R2_BUCKET_NAME }}
            R2_PUBLIC_URL=${{ secrets.R2_PUBLIC_URL }}
            FB_APP_ID=${{ secrets.FB_APP_ID }}
            FB_APP_SECRET=${{ secrets.FB_APP_SECRET }}
            NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
            NEXTAUTH_URL=https://flownau.9nau.com
            TAG=latest
            ENVEOF
            tr -d '\r' < /root/flownau/.env.tmp > /root/flownau/.env

            cd /root/flownau
            docker system prune -f
            docker compose pull

            # Run pending Prisma migrations before starting the app container
            docker compose run --rm --no-deps -e DATABASE_URL="postgresql://flownau_user:${{ secrets.DB_PASSWORD }}@postgres:5432/flownau" app npx prisma migrate deploy

            docker compose up -d --remove-orphans
