services:
  flownau:
    container_name: flownau
    image: ghcr.io/samuelaure/nau/flownau:${TAG:-latest}
    env_file: .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${DATABASE_USER}:${DATABASE_PASSWORD}@flownau-postgres:5432/${DATABASE_NAME}
      - REDIS_HOST=flownau-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - FFMPEG_PATH=/usr/bin/ffmpeg
      - FFPROBE_PATH=/usr/bin/ffprobe
    depends_on:
      flownau-postgres:
        condition: service_healthy
      flownau-redis:
        condition: service_healthy
    networks:
      - nau-network
    labels:
      - traefik.enable=true
      - traefik.http.routers.flownau.rule=Host(`flownau.9nau.com`)
      - traefik.http.routers.flownau.entrypoints=websecure
      - traefik.http.routers.flownau.tls=true
      - traefik.http.routers.flownau.tls.certresolver=letsencrypt
      - traefik.http.services.flownau.loadbalancer.server.port=3000
      - traefik.docker.network=nau-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: '0.40'
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'

  flownau-renderer:
    container_name: flownau-renderer
    image: ghcr.io/samuelaure/nau/flownau-renderer:${TAG:-latest}
    env_file: .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${DATABASE_USER}:${DATABASE_PASSWORD}@flownau-postgres:5432/${DATABASE_NAME}
      - REDIS_HOST=flownau-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - FFMPEG_PATH=/usr/bin/ffmpeg
      - FFPROBE_PATH=/usr/bin/ffprobe
    depends_on:
      flownau-postgres:
        condition: service_healthy
      flownau-redis:
        condition: service_healthy
    networks:
      - nau-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1536M
          cpus: '1.00'
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'

  flownau-postgres:
    image: postgres:16-alpine
    container_name: flownau-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}']
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - flownau-postgres-data:/var/lib/postgresql/data
    networks:
      - nau-network
    deploy:
      resources:
        limits:
          memory: 192M
          cpus: '0.30'
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'

  flownau-redis:
    image: redis:7-alpine
    container_name: flownau-redis
    restart: unless-stopped
    command: redis-server --requirepass "${REDIS_PASSWORD}"
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a "$$REDIS_PASSWORD" ping']
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - flownau-redis-data:/data
    networks:
      - nau-network
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.10'
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'

networks:
  nau-network:
    external: true

volumes:
  flownau-postgres-data:
  flownau-redis-data:
