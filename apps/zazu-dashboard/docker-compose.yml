services:
  zazu-dashboard:
    container_name: zazu-dashboard
    image: ghcr.io/samuelaure/nau/zazu-dashboard:${TAG:-latest}
    env_file: .env
    environment:
      - NODE_ENV=production
    networks:
      - nau-network
    labels:
      - traefik.enable=true
      - traefik.http.routers.zazu-dashboard.rule=Host(`zazu.9nau.com`)
      - traefik.http.routers.zazu-dashboard.entrypoints=websecure
      - traefik.http.routers.zazu-dashboard.tls=true
      - traefik.http.routers.zazu-dashboard.tls.certresolver=letsencrypt
      - traefik.http.services.zazu-dashboard.loadbalancer.server.port=3000
      - traefik.docker.network=nau-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: '0.50'
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'

networks:
  nau-network:
    external: true
