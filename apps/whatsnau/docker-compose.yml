x-app-env: &app-env
  env_file: .env
  environment:
    - NODE_ENV=production
    - DATABASE_URL=postgresql://${DATABASE_USER}:${DATABASE_PASSWORD}@whatsnau-postgres:5432/${DATABASE_NAME}?schema=public
    - REDIS_HOST=whatsnau-redis
    - REDIS_PORT=6379
    - REDIS_PASSWORD=${REDIS_PASSWORD}

services:
  whatsnau:
    container_name: whatsnau
    image: ghcr.io/samuelaure/nau/whatsnau:${TAG:-latest}
    <<: *app-env
    depends_on:
      whatsnau-postgres:
        condition: service_healthy
      whatsnau-redis:
        condition: service_healthy
    networks:
      - nau-network
    labels:
      - traefik.enable=true
      - traefik.http.routers.whatsnau.rule=Host(`whatsnau.9nau.com`)
      - traefik.http.routers.whatsnau.entrypoints=websecure
      - traefik.http.routers.whatsnau.tls=true
      - traefik.http.routers.whatsnau.tls.certresolver=letsencrypt
      - traefik.http.services.whatsnau.loadbalancer.server.port=3000
      - traefik.docker.network=nau-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: '0.50'
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'

  whatsnau-worker:
    container_name: whatsnau-worker
    image: ghcr.io/samuelaure/nau/whatsnau:${TAG:-latest}
    command: npm run start:worker:prod
    <<: *app-env
    depends_on:
      whatsnau-postgres:
        condition: service_healthy
      whatsnau-redis:
        condition: service_healthy
    networks:
      - nau-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: '0.50'
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'

  whatsnau-postgres:
    image: postgres:16-alpine
    container_name: whatsnau-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}']
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - whatsnau-postgres-data:/var/lib/postgresql/data
    networks:
      - nau-network
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.20'
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'

  whatsnau-redis:
    image: redis:7-alpine
    container_name: whatsnau-redis
    restart: unless-stopped
    command: redis-server --requirepass "${REDIS_PASSWORD}"
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a "$$REDIS_PASSWORD" ping']
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - whatsnau-redis-data:/data
    networks:
      - nau-network
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.10'
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'

networks:
  nau-network:
    external: true

volumes:
  whatsnau-postgres-data:
  whatsnau-redis-data:
