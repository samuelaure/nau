services:
  api:
    container_name: api
    image: ghcr.io/samuelaure/nau/api:${TAG:-latest}
    env_file: .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${DATABASE_USER}:${DATABASE_PASSWORD}@api-postgres:5432/${DATABASE_NAME}
      - REDIS_HOST=api-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    depends_on:
      api-postgres:
        condition: service_healthy
      api-redis:
        condition: service_healthy
    networks:
      - nau-network
    labels:
      - traefik.enable=true
      - traefik.http.routers.api.rule=Host(`api.9nau.com`)
      - traefik.http.routers.api.entrypoints=websecure
      - traefik.http.routers.api.tls=true
      - traefik.http.routers.api.tls.certresolver=letsencrypt
      - traefik.http.services.api.loadbalancer.server.port=3000
      - traefik.docker.network=nau-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.50'
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'

  api-postgres:
    image: postgres:16-alpine
    container_name: api-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}']
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - api-postgres-data:/var/lib/postgresql/data
    networks:
      - nau-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.30'
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'

  api-redis:
    image: redis:7-alpine
    container_name: api-redis
    restart: unless-stopped
    command: redis-server --requirepass "${REDIS_PASSWORD}"
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a "$$REDIS_PASSWORD" ping']
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - api-redis-data:/data
    networks:
      - nau-network
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.10'
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'

networks:
  nau-network:
    external: true

volumes:
  api-postgres-data:
  api-redis-data:
