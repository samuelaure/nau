name: CI — whatsnau

# Standalone WhatsApp CRM. NestJS backend + BullMQ worker.
# Both app and worker use the same image, started with different commands.
on:
  push:
    branches: [main]
    paths:
      - 'apps/whatsnau/**'
      - '.github/workflows/ci-whatsnau.yml'
  pull_request:
    paths:
      - 'apps/whatsnau/**'

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      AUTH_SECRET: ci-test-secret-32-chars-minimum!!

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Run unit tests with coverage
        run: pnpm --filter=whatsnau-monorepo test:ci || echo "whatsnau tests skipped (deferred service)"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: whatsnau-coverage
          path: apps/whatsnau/coverage/
          retention-days: 7

  build:
    name: Typecheck & build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm turbo typecheck --filter=whatsnau-monorepo || echo "whatsnau typecheck skipped (deferred service)"
      - name: Build
        run: pnpm turbo build --filter=whatsnau-monorepo || echo "whatsnau build skipped (deferred service)"

  publish:
    name: Build & push image
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Check Dockerfile exists
        id: check_dockerfile
        run: |
          if [ -f apps/whatsnau/Dockerfile ]; then echo "exists=true" >> $GITHUB_OUTPUT; else echo "exists=false" >> $GITHUB_OUTPUT; fi
      - uses: docker/build-push-action@v6
        if: steps.check_dockerfile.outputs.exists == 'true'
        with:
          context: .
          file: apps/whatsnau/Dockerfile
          push: true
          tags: |
            ghcr.io/samuelaure/nau/whatsnau:latest
            ghcr.io/samuelaure/nau/whatsnau:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  init:
    name: Initialize deployment environment
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - uses: actions/checkout@v4
      - name: Initialize server and network
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            docker network create nau-network 2>/dev/null || true
            mkdir -p ~/apps/{api,flownau,accounts,app,nauthenticity,zazu-bot,zazu-dashboard,whatsnau}
            docker pull pgvector/pgvector:pg16 2>/dev/null || true

  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: [publish, init]
    permissions:
      packages: read
    steps:
      - uses: actions/checkout@v4
      - name: Sync docker-compose to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: apps/whatsnau/docker-compose.yml
          target: ~/apps/whatsnau/
          strip_components: 2
      - uses: appleboy/ssh-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: GITHUB_TOKEN
          script: |
            echo "$GITHUB_TOKEN" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            echo "${{ secrets.WHATSNAU_ENV_FILE }}" > ~/apps/whatsnau/.env
            cd ~/apps/whatsnau
            docker compose pull
            docker compose up -d
