name: CI — packages

# Shared packages. Packages with jest.config.js (nau-core, nau-ui) get tested.
# --if-present skips packages without a "test" script gracefully.
on:
  push:
    branches: [main]
    paths:
      - 'packages/**'
      - '.github/workflows/ci-packages.yml'
  pull_request:
    paths:
      - 'packages/**'

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Run tests for all packages
        run: pnpm --filter='./packages/*' --if-present run test -- --passWithNoTests

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: packages-coverage
          path: packages/*/coverage/
          retention-days: 7

  build:
    name: Typecheck & build all packages
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Typecheck all packages
        run: pnpm turbo typecheck --filter='./packages/*'
      - name: Build all packages
        run: pnpm turbo build --filter='./packages/*'
