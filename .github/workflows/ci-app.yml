name: CI — app

# The main 9naŭ front-end (Next.js 14, React Query, Zustand).
# Uses Vitest + @testing-library/react. Component and hook tests run against
# jsdom; no real API required because fetch is mocked via vi.stubGlobal.
on:
  push:
    branches: [main]
    paths:
      - 'apps/app/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/ci-app.yml'
  pull_request:
    paths:
      - 'apps/app/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Run unit tests with coverage
        run: pnpm --filter=@9nau/app test:ci

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-coverage
          path: apps/app/coverage/
          retention-days: 7

  build:
    name: Typecheck & build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm turbo typecheck --filter=@9nau/app
      - name: Build
        run: pnpm turbo build --filter=@9nau/app

  publish:
    name: Build & push image
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/app/Dockerfile
          push: true
          tags: |
            ghcr.io/samuelaure/nau/app:latest
            ghcr.io/samuelaure/nau/app:sha-${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.9nau.com
            NEXT_PUBLIC_ACCOUNTS_URL=https://accounts.9nau.com
            NEXT_PUBLIC_APP_URL=https://app.9nau.com
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            echo "${{ secrets.APP_ENV_FILE }}" > ~/apps/app/.env
            cd ~/apps/app
            docker compose pull
            docker compose up -d
            docker image prune -f
