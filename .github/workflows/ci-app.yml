name: CI — app

# The main 9naŭ front-end (Next.js 14, React Query, Zustand).
# Uses Vitest + @testing-library/react. Component and hook tests run against
# jsdom; no real API required because fetch is mocked via vi.stubGlobal.
on:
  push:
    branches: [main]
    paths:
      - 'apps/app/**'
      - 'packages/**'
      - '.github/workflows/ci-app.yml'
  pull_request:
    paths:
      - 'apps/app/**'
      - 'packages/**'

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run unit tests with coverage
        run: pnpm --filter=@9nau/app test:ci

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-coverage
          path: apps/app/coverage/
          retention-days: 7

  build:
    name: Typecheck & build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm turbo typecheck --filter=@9nau/app

      - name: Build
        run: pnpm turbo build --filter=@9nau/app
