name: CI — mobile

# Expo/React Native app. Tests run under Jest with the react-native preset.
# No device/emulator required — jest-expo patches the RN runtime for Node.
# Expo SDK modules (expo-sqlite, expo-file-system, etc.) are auto-mocked.
on:
  push:
    branches: [main]
    paths:
      - 'apps/mobile/**'
      - '.github/workflows/ci-mobile.yml'
  pull_request:
    paths:
      - 'apps/mobile/**'

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run unit tests with coverage
        run: pnpm --filter=mobile test:ci

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mobile-coverage
          path: apps/mobile/coverage/
          retention-days: 7

  build:
    name: Typecheck
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter=mobile type-check
