name: CI — E2E (Playwright)

# E2E tests run on push to main and on PRs that touch any app or the E2E suite itself.
# They require a running set of services, provided by docker-compose.
#
# IMPORTANT: E2E tests require the following secrets to be set in GitHub:
#   ROOT_ENV_FILE  — full env file content (see .env.example at repo root)
#   AUTH_SECRET    — must match the secret used by the api service
#
# The test database is seeded by the api app's seed script before tests run.
# See apps/api/prisma/seed.ts and the "Seed test database" step below.
on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'tests/e2e/**'
      - 'playwright.config.ts'
      - '.github/workflows/ci-e2e.yml'
  pull_request:
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'tests/e2e/**'
      - 'playwright.config.ts'

jobs:
  e2e:
    name: Playwright E2E tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      # PostgreSQL used by the api and nauthenticity services during E2E
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nau
          POSTGRES_PASSWORD: nau_test
          POSTGRES_DB: nau_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # Redis used by BullMQ queues in api and nauthenticity
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://nau:nau_test@localhost:5432/nau_e2e
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      # Point accounts app at the locally running API
      NAU_API_URL: http://localhost:3000
      # Override Playwright base URLs to point to CI-started dev servers
      PLAYWRIGHT_BASE_URL_ACCOUNTS: http://localhost:3002
      PLAYWRIGHT_BASE_URL_APP: http://localhost:3001
      PLAYWRIGHT_BASE_URL_ZAZU_DASHBOARD: http://localhost:3003

    steps:
      - uses: actions/checkout@v4

      - name: Load E2E env vars
        run: |
          echo "${{ secrets.ROOT_ENV_FILE }}" > .env.e2e
          grep -v '^#' .env.e2e | grep -v '^$' >> $GITHUB_ENV
          rm .env.e2e

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm build --filter='./packages/**'

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run API DB migrations
        run: pnpm --filter=@9nau/api test:db:migrate:deploy

      - name: Generate Prisma client
        run: pnpm --filter=@9nau/api exec prisma generate

      - name: Build API
        run: pnpm --filter=@9nau/api run build

      - name: Seed test database
        run: pnpm --filter=@9nau/api test:db:seed

      - name: Start API (background)
        # Run precompiled output — avoids TypeScript compilation delay at startup
        run: node apps/api/dist/src/main.js &

      - name: Start accounts app (background)
        # Use next directly — CI env vars are already set; avoid Ruby dotenv conflict
        run: pnpm --filter=@9nau/accounts exec next dev --port 3002 &

      - name: Start main app (background)
        run: pnpm --filter=@9nau/app exec next dev --port 3001 &

      - name: Wait for apps to be ready
        run: |
          npx wait-on http://localhost:3000/health http://localhost:3002/login http://localhost:3001 --timeout 120000

      - name: Run Playwright tests
        run: pnpm exec playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test videos (on failure)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-videos
          path: test-results/
          retention-days: 7
