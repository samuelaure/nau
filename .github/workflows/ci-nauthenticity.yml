name: CI — nauthenticity

# NestJS brand intelligence service. Jest + ts-jest. All Prisma and HTTP calls
# are mocked — no real DB or Apify credentials required in CI.
on:
  push:
    branches: [main]
    paths:
      - 'apps/nauthenticity/**'
      - 'packages/**'
      - '.github/workflows/ci-nauthenticity.yml'
  pull_request:
    paths:
      - 'apps/nauthenticity/**'
      - 'packages/**'

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      AUTH_SECRET: ci-test-secret-32-chars-minimum!!
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci_nauthenticity
      APIFY_TOKEN: ci-apify-token
      OPENAI_API_KEY: ci-openai-key

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Run unit tests with coverage
        run: pnpm --filter=nauthenticity test:ci

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nauthenticity-coverage
          path: apps/nauthenticity/coverage/
          retention-days: 7

  build:
    name: Typecheck & build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm turbo typecheck --filter=nauthenticity
      - name: Build
        run: pnpm turbo build --filter=nauthenticity
