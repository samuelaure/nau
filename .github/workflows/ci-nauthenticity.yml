name: CI — nauthenticity

# NestJS brand intelligence service. Jest + ts-jest. All Prisma and HTTP calls
# are mocked — no real DB or Apify credentials required in CI.
on:
  push:
    branches: [main]
    paths:
      - 'apps/nauthenticity/**'
      - 'packages/**'
      - '.github/workflows/ci-nauthenticity.yml'
  pull_request:
    paths:
      - 'apps/nauthenticity/**'
      - 'packages/**'

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      AUTH_SECRET: ci-test-secret-32-chars-minimum!!
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci_nauthenticity
      APIFY_TOKEN: ci-apify-token
      OPENAI_API_KEY: ci-openai-key

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build workspace packages
        run: pnpm build --filter='./packages/**'

      - name: Run unit tests with coverage
        run: pnpm --filter=nauthenticity test:ci

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nauthenticity-coverage
          path: apps/nauthenticity/coverage/
          retention-days: 7

  build:
    name: Typecheck & build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm turbo typecheck --filter=nauthenticity
      - name: Build
        run: pnpm turbo build --filter=nauthenticity

  publish:
    name: Build & push image
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/nauthenticity/Dockerfile
          push: true
          tags: |
            ghcr.io/samuelaure/nau/nauthenticity:latest
            ghcr.io/samuelaure/nau/nauthenticity:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            mkdir -p ~/apps/nauthenticity/storage
            echo "${{ secrets.NAUTHENTICITY_ENV_FILE }}" > ~/apps/nauthenticity/.env
            cd ~/apps/nauthenticity
            docker compose pull
            docker compose up -d nauthenticity-postgres nauthenticity-redis
            docker compose run --rm --no-deps nauthenticity sh -c "cd apps/nauthenticity && npx prisma migrate deploy"
            docker compose up -d
            docker image prune -f
