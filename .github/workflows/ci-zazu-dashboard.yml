name: CI — zazu-dashboard

# Next.js 15 Telegram Web App. Uses Vitest + @testing-library/react.
# Telegram init-data validation (HMAC/crypto) tested with crafted signatures.
on:
  push:
    branches: [main]
    paths:
      - 'apps/zazu-dashboard/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/ci-zazu-dashboard.yml'
  pull_request:
    paths:
      - 'apps/zazu-dashboard/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      TELEGRAM_BOT_TOKEN: ci-bot-token

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Run unit tests with coverage
        run: pnpm --filter=@zazu/dashboard test:ci

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zazu-dashboard-coverage
          path: apps/zazu-dashboard/coverage/
          retention-days: 7

  build:
    name: Typecheck & build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm turbo typecheck --filter=@zazu/dashboard
      - name: Build
        run: pnpm turbo build --filter=@zazu/dashboard

  publish:
    name: Build & push image
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/zazu-dashboard/Dockerfile
          push: true
          tags: |
            ghcr.io/samuelaure/nau/zazu-dashboard:latest
            ghcr.io/samuelaure/nau/zazu-dashboard:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            echo "${{ secrets.ZAZU_DASHBOARD_ENV_FILE }}" > ~/apps/zazu-dashboard/.env
            cd ~/apps/zazu-dashboard
            docker compose pull
            docker compose up -d
            docker image prune -f
