name: CI — zazu-bot

# Express + Telegraf Telegram bot. Uses Vitest.
# SkillManager and service-auth middleware tested with mocked Telegraf contexts.
on:
  push:
    branches: [main]
    paths:
      - 'apps/zazu-bot/**'
      - 'packages/**'
      - '.github/workflows/ci-zazu-bot.yml'
  pull_request:
    paths:
      - 'apps/zazu-bot/**'
      - 'packages/**'

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      AUTH_SECRET: ci-test-secret-32-chars-minimum!!
      TELEGRAM_BOT_TOKEN: ci-bot-token

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Run unit tests with coverage
        run: pnpm --filter=@zazu/bot test:ci

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zazu-bot-coverage
          path: apps/zazu-bot/coverage/
          retention-days: 7

  build:
    name: Typecheck & build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm turbo typecheck --filter=@zazu/bot
      - name: Build
        run: pnpm turbo build --filter=@zazu/bot
