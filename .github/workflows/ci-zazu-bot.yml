name: CI — zazu-bot

# Express + Telegraf Telegram bot. Uses Vitest.
# SkillManager and service-auth middleware tested with mocked Telegraf contexts.
on:
  push:
    branches: [main]
    paths:
      - 'apps/zazu-bot/**'
      - 'packages/**'
      - '.github/workflows/ci-zazu-bot.yml'
  pull_request:
    paths:
      - 'apps/zazu-bot/**'
      - 'packages/**'

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      AUTH_SECRET: ci-test-secret-32-chars-minimum!!
      TELEGRAM_BOT_TOKEN: ci-bot-token

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build workspace packages
        run: pnpm build --filter='./packages/**'

      - name: Run unit tests with coverage
        run: pnpm --filter=@zazu/bot test:ci

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zazu-bot-coverage
          path: apps/zazu-bot/coverage/
          retention-days: 7

  build:
    name: Typecheck & build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm turbo typecheck --filter=@zazu/bot
      - name: Build
        run: pnpm turbo build --filter=@zazu/bot

  publish:
    name: Build & push image
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/zazu-bot/Dockerfile
          push: true
          tags: |
            ghcr.io/samuelaure/nau/zazu-bot:latest
            ghcr.io/samuelaure/nau/zazu-bot:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            echo "${{ secrets.ZAZU_BOT_ENV_FILE }}" > ~/apps/zazu-bot/.env
            cd ~/apps/zazu-bot
            docker compose pull
            docker compose up -d zazu-postgres
            docker compose run --rm --no-deps zazu-bot sh -c "cd apps/zazu-bot && npx prisma migrate deploy"
            docker compose up -d
            docker image prune -f
