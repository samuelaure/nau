name: Uptime monitoring

on:
  schedule:
    # Runs every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check:
    name: Health checks
    runs-on: ubuntu-latest
    steps:
      - name: Check all service health endpoints
        id: checks
        run: |
          FAILED=""
          PASSED=""

          check() {
            local name="$1"
            local url="$2"
            local status
            status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$url" || echo "000")
            if [ "$status" = "200" ]; then
              PASSED="$PASSED\n✅ $name"
            else
              FAILED="$FAILED\n❌ $name ($url) — HTTP $status"
            fi
          }

          check "api"            "https://api.9nau.com/health"
          check "accounts"       "https://accounts.9nau.com"
          check "app"            "https://app.9nau.com"
          check "flownau"        "https://flownau.9nau.com"
          check "nauthenticity"  "https://nauthenticity.9nau.com/health"
          check "zazu-bot"       "https://bot.9nau.com/health"
          check "zazu-dashboard" "https://zazu.9nau.com"

          echo "FAILED<<EOF" >> $GITHUB_OUTPUT
          printf "%b" "$FAILED" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          if [ -n "$FAILED" ]; then
            echo "HAS_FAILURES=true" >> $GITHUB_OUTPUT
          else
            echo "HAS_FAILURES=false" >> $GITHUB_OUTPUT
          fi

      - name: Send Telegram alert on failure
        if: steps.checks.outputs.HAS_FAILURES == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.UPTIME_TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.UPTIME_TELEGRAM_CHAT_ID }}
        run: |
          MESSAGE="🚨 *naŭ Platform — Service Down*%0A%0A${{ steps.checks.outputs.FAILED }}%0A%0ACheck: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${MESSAGE}" \
            -d "parse_mode=Markdown" \
            -d "disable_web_page_preview=true"
