name: CI — accounts

# Next.js 14 SSO identity hub. Uses Vitest + @testing-library/react.
# Server actions are tested by mocking fetch and next/headers — no real API needed.
on:
  push:
    branches: [main]
    paths:
      - 'apps/accounts/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/ci-accounts.yml'
  pull_request:
    paths:
      - 'apps/accounts/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build workspace packages
        run: pnpm build --filter='./packages/**'

      - name: Run unit tests with coverage
        run: pnpm --filter=@9nau/accounts test:ci

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: accounts-coverage
          path: apps/accounts/coverage/
          retention-days: 7

  build:
    name: Typecheck & build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build workspace packages
        run: pnpm build --filter='./packages/**'
      - name: Typecheck
        run: pnpm turbo typecheck --filter=@9nau/accounts
      - name: Build
        run: pnpm turbo build --filter=@9nau/accounts

  publish:
    name: Build & push image
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/accounts/Dockerfile
          push: true
          tags: |
            ghcr.io/samuelaure/nau/accounts:latest
            ghcr.io/samuelaure/nau/accounts:sha-${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.9nau.com
            NEXT_PUBLIC_ACCOUNTS_URL=https://accounts.9nau.com
            NEXT_PUBLIC_APP_URL=https://app.9nau.com
          cache-from: type=gha
          cache-to: type=gha,mode=max

  init:
    name: Initialize deployment environment
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - uses: actions/checkout@v4
      - name: Initialize server and network
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            docker network create nau-network 2>/dev/null || true
            mkdir -p ~/apps/{api,flownau,accounts,app,nauthenticity,zazu-bot,zazu-dashboard,whatsnau}
            docker pull pgvector/pgvector:pg16 2>/dev/null || true

  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: [publish, init]
    permissions:
      packages: read
    steps:
      - uses: appleboy/ssh-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: GITHUB_TOKEN
          script: |
            echo "$GITHUB_TOKEN" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            echo "${{ secrets.ACCOUNTS_ENV_FILE }}" > ~/apps/accounts/.env
            cd ~/apps/accounts
            docker compose pull
            docker compose up -d
            docker image prune -f || true
