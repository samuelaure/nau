name: CI — accounts

# Next.js 14 SSO identity hub. Uses Vitest + @testing-library/react.
# Server actions are tested by mocking fetch and next/headers — no real API needed.
on:
  push:
    branches: [main]
    paths:
      - 'apps/accounts/**'
      - 'packages/**'
      - '.github/workflows/ci-accounts.yml'
  pull_request:
    paths:
      - 'apps/accounts/**'
      - 'packages/**'

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Run unit tests with coverage
        run: pnpm --filter=accounts test:ci

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: accounts-coverage
          path: apps/accounts/coverage/
          retention-days: 7

  build:
    name: Typecheck & build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm turbo typecheck --filter=accounts
      - name: Build
        run: pnpm turbo build --filter=accounts
