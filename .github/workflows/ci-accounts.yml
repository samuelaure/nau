name: CI — accounts

on:
  push:
    branches: [main]
    paths:
      - 'apps/accounts/**'
      - 'packages/**'
      - '.github/workflows/ci-accounts.yml'
  pull_request:
    paths:
      - 'apps/accounts/**'
      - 'packages/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm turbo typecheck --filter=accounts

      - name: Build
        run: pnpm turbo build --filter=accounts
