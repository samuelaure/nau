name: CI — api

# Triggers on any push to main or PR touching api app or shared packages.
# Tests run BEFORE build so failures surface fast without wasting build time.
# Unit tests mock all Prisma calls via jest-mock-extended — no database needed.
on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/ci-api.yml'
  pull_request:
    paths:
      - 'apps/api/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      AUTH_SECRET: ci-test-secret-32-chars-minimum!!
      OPENAI_API_KEY: ci-test-openai-key

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build workspace packages
        run: pnpm build --filter='./packages/**'
      - name: Generate Prisma client
        run: pnpm --filter=@9nau/api exec npx prisma generate

      - name: Run unit tests with coverage
        run: pnpm --filter=@9nau/api test:cov

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-coverage
          path: apps/api/coverage/
          retention-days: 7

  build:
    name: Typecheck & build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build workspace packages
        run: pnpm build --filter='./packages/**'
      - name: Generate Prisma client
        run: pnpm --filter=@9nau/api exec npx prisma generate
      - name: Typecheck
        run: pnpm turbo typecheck --filter=@9nau/api
      - name: Build
        run: pnpm turbo build --filter=@9nau/api

  publish:
    name: Build & push image
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ghcr.io/samuelaure/nau/api:latest
            ghcr.io/samuelaure/nau/api:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  init:
    name: Initialize deployment environment
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - uses: actions/checkout@v4
      - name: Initialize server and network
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            docker network create nau-network 2>/dev/null || true
            mkdir -p ~/apps/{api,flownau,accounts,app,nauthenticity,zazu-bot,zazu-dashboard,whatsnau}
            docker pull pgvector/pgvector:pg16 2>/dev/null || true

  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: [publish, init]
    permissions:
      packages: read
    steps:
      - uses: actions/checkout@v4
      - name: Sync docker-compose to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: apps/api/docker-compose.yml
          target: ~/apps/api/
          strip_components: 2
      - uses: appleboy/ssh-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: GITHUB_TOKEN
          script: |
            echo "$GITHUB_TOKEN" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            echo "${{ secrets.API_ENV_FILE }}" > ~/apps/api/.env
            cd ~/apps/api
            docker compose pull
            docker compose up -d api-postgres api-redis
            docker compose run --rm --no-deps api npx prisma migrate deploy
            docker compose up -d
            docker image prune -f || true
