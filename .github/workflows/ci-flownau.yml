name: CI — flownau

# flownau uses Vitest (not Jest). test:ci = "vitest --run --coverage".
# DATABASE_URL dummy prevents config module from crashing at import time.
on:
  push:
    branches: [main]
    paths:
      - 'apps/flownau/**'
      - 'packages/**'
      - '.github/workflows/ci-flownau.yml'
  pull_request:
    paths:
      - 'apps/flownau/**'
      - 'packages/**'

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci_test
      AUTH_SECRET: ci-test-secret-32-chars-minimum!!

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Run unit tests with coverage
        run: pnpm --filter=flownau test:ci

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: flownau-coverage
          path: apps/flownau/coverage/
          retention-days: 7

  build:
    name: Typecheck & build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm turbo typecheck --filter=flownau
      - name: Build
        run: pnpm turbo build --filter=flownau
