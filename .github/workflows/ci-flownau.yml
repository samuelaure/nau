name: CI — flownau

# flownau uses Vitest (not Jest). test:ci = "vitest --run --coverage".
# DATABASE_URL dummy prevents config module from crashing at import time.
on:
  push:
    branches: [main]
    paths:
      - 'apps/flownau/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/ci-flownau.yml'
  pull_request:
    paths:
      - 'apps/flownau/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci_test
      AUTH_SECRET: ci-test-secret-32-chars-minimum!!

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build workspace packages
        run: pnpm build --filter='./packages/**'

      - name: Run unit tests with coverage
        run: pnpm --filter=flownau test:ci

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: flownau-coverage
          path: apps/flownau/coverage/
          retention-days: 7

  build:
    name: Typecheck & build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build workspace packages
        run: pnpm build --filter='./packages/**'
      - name: Generate Prisma client
        run: pnpm --filter=flownau prisma:generate
      - name: Typecheck
        run: pnpm turbo typecheck --filter=flownau
      - name: Build
        run: pnpm turbo build --filter=flownau

      - name: Upload Next.js build output
        uses: actions/upload-artifact@v4
        with:
          name: flownau-next-build
          path: apps/flownau/.next/
          retention-days: 1
          include-hidden-files: true

  publish:
    name: Build & push image
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Download Next.js build output
        uses: actions/download-artifact@v4
        with:
          name: flownau-next-build
          path: apps/flownau/.next/
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push app image
        uses: docker/build-push-action@v6
        with:
          context: apps/flownau
          file: apps/flownau/Dockerfile
          push: true
          tags: |
            ghcr.io/samuelaure/nau/flownau:latest
            ghcr.io/samuelaure/nau/flownau:sha-${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_ACCOUNTS_URL=https://accounts.9nau.com
            NEXT_PUBLIC_APP_URL=https://app.9nau.com
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build & push renderer image
        uses: docker/build-push-action@v6
        with:
          context: apps/flownau
          file: apps/flownau/Dockerfile.renderer
          push: true
          tags: |
            ghcr.io/samuelaure/nau/flownau-renderer:latest
            ghcr.io/samuelaure/nau/flownau-renderer:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            echo "${{ secrets.FLOWNAU_ENV_FILE }}" > ~/apps/flownau/.env
            cd ~/apps/flownau
            docker compose pull
            docker compose up -d flownau-postgres flownau-redis
            docker compose run --rm --no-deps flownau sh -c "cd apps/flownau && npx prisma migrate deploy"
            docker compose up -d
            docker image prune -f
