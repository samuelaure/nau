services:
  gateway:
    image: traefik:v3
    container_name: nau-gateway
    restart: unless-stopped
    command:
      - --providers.docker=true
      - --providers.docker.exposedByDefault=false
      - --providers.docker.network=nau-network
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.tlschallenge=true
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/acme.json
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./acme.json:/acme.json
    networks:
      - nau-network

  backup:
    build:
      context: ./infra/backup
      dockerfile: Dockerfile
    container_name: nau-backup
    restart: unless-stopped
    environment:
      - R2_BUCKET_NAME=${BACKUP_R2_BUCKET_NAME}
      - R2_ACCESS_KEY_ID=${BACKUP_R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${BACKUP_R2_SECRET_ACCESS_KEY}
      - R2_ENDPOINT=${BACKUP_R2_ENDPOINT}
      - API_DB_PASSWORD=${API_DB_PASSWORD}
      - FLOWNAU_DB_PASSWORD=${FLOWNAU_DB_PASSWORD}
      - NAUTHENTICITY_DB_PASSWORD=${NAUTHENTICITY_DB_PASSWORD}
      - ZAZU_DB_PASSWORD=${ZAZU_DB_PASSWORD}
      - WHATSNAU_DB_PASSWORD=${WHATSNAU_DB_PASSWORD}
    networks:
      - nau-network

networks:
  nau-network:
    external: true
